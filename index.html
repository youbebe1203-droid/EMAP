<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMAP: Emotion Village Map</title>
    <!-- React 및 Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --oi-index: 50%; --dv-index: 50%; --hr-index: 50%; --sf-index: 50%;
            --primary: #74b9ff; --secondary: #a29bfe; --warm: #fab1a0; --text: #2d3436; --bg: #f9f9f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* [수정] 스크롤 가능하도록 overflow 설정 변경 */
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            overflow-x: hidden; 
            overflow-y: auto; /* 세로 스크롤 허용 */
            min-height: 100vh;
        }

        .fog-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            backdrop-filter: blur(calc((100 - var(--oi-index)) * 0.15px));
            background-color: rgba(255, 255, 255, calc((100 - var(--oi-index)) * 0.003));
            z-index: 1; pointer-events: none; transition: all 1.5s ease;
        }

        .emap-app {
            min-height: 100vh; 
            display: flex; 
            justify-content: center;
            align-items: calc(var(--sf-index) > 50% ? 'flex-start' : 'center');
            padding: 40px 20px; /* 여백 추가 */
            position: relative; 
            z-index: 10;
        }

        .main-content { 
            width: 100%; 
            max-width: 600px; 
            transition: all 0.5s ease;
            position: relative;
        }

        .card {
            background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(20px);
            border-radius: 45px; padding: 55px 45px; box-shadow: 0 25px 70px rgba(0, 0, 0, 0.05);
            text-align: center; border: 1px solid rgba(255, 255, 255, 0.4);
            filter: contrast(calc(0.85 + (var(--dv-index) * 0.0035)));
            transition: all 1s ease;
            width: 100%;
        }

        .main-title { font-size: 3.8rem; letter-spacing: 0.8rem; color: var(--primary); font-weight: 900; margin-bottom: 0.5rem; }
        .philosophy { font-style: italic; color: #636e72; line-height: 1.6; margin-bottom: 2.5rem; font-size: 1.05rem; }

        /* 조약돌 버튼 시스템 */
        .scale-container { display: flex; justify-content: space-between; align-items: center; padding: 50px 0; position: relative; }
        .scale-container::before { content: ''; position: absolute; top: 50%; left: 8%; right: 8%; height: 2px; background: #eee; z-index: 1; }
        
        .btn-scale { 
            position: relative; z-index: 2; border: 2.5px solid #eee; background: white; 
            border-radius: 50%; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center; align-items: center;
        }
        .btn-scale span { position: absolute; bottom: -35px; font-size: 0.75rem; color: #aaa; white-space: nowrap; font-weight: 500; opacity: 0; transition: 0.3s; }
        .btn-scale:hover span { opacity: 1; bottom: -40px; }

        .v-agree { width: 68px; height: 68px; border-color: var(--primary); }
        .agree { width: 52px; height: 52px; border-color: var(--primary); }
        .neutral { width: 42px; height: 42px; border-color: #ddd; }
        .disagree { width: 52px; height: 52px; border-color: var(--warm); }
        .v-disagree { width: 68px; height: 68px; border-color: var(--warm); }

        .btn-scale.selected.v-agree, .btn-scale.selected.agree { background-color: var(--primary); transform: scale(1.15); box-shadow: 0 10px 20px rgba(116, 185, 255, 0.3); }
        .btn-scale.selected.neutral { background-color: #ccc; transform: scale(1.15); }
        .btn-scale.selected.disagree, .btn-scale.selected.v-disagree { background-color: var(--warm); transform: scale(1.15); box-shadow: 0 10px 20px rgba(250, 177, 160, 0.3); }

        /* [수정] 딜레마 버튼 디자인 일관성 적용 */
        .btn-action { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 20px 40px; 
            border-radius: 30px; 
            font-size: 1.1rem; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.3s; 
            box-shadow: 0 10px 25px rgba(116, 185, 255, 0.2); 
            width: 100%;
            margin-top: 1rem;
        }
        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(116, 185, 255, 0.3); }
        .btn-action.secondary { background: white; color: var(--primary); border: 2px solid var(--primary); }

        .transition-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; animation: slideUp 1.4s ease-in-out forwards; }
        @keyframes slideUp { 0% { transform: translateY(100%); } 35%, 65% { transform: translateY(0); } 100% { transform: translateY(-100%); } }
        
        .fade-in { animation: fadeIn 1s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .bear-name { font-size: 3rem; color: var(--primary); margin: 15px 0; font-weight: 900; }
        .bear-code { color: #b2bec3; font-size: 1rem; letter-spacing: 5px; margin-bottom: 25px; font-weight: 700; }
        .quote-box { background: #f8faff; padding: 30px; border-radius: 25px; margin: 30px 0; font-style: italic; line-height: 1.8; color: #444; border-left: 5px solid var(--primary); }
        .trait-tags { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 40px; }
        .tag { background: white; border: 1px solid #eee; padding: 8px 20px; border-radius: 50px; font-size: 0.9rem; font-weight: 600; }
        .letter-paper { background: #fffdf7; padding: 35px; border-radius: 25px; border: 1px solid #f0e6cc; line-height: 1.9; color: #5d5238; text-align: left; position: relative; box-shadow: inset 0 0 40px rgba(0,0,0,0.02); }
        .letter-paper::after { content: '🐱🐾'; position: absolute; bottom: 20px; right: 25px; font-size: 1.5rem; opacity: 0.5; }

        .synergy-badge { display: inline-block; padding: 6px 15px; border-radius: 10px; font-size: 0.8rem; font-weight: 800; margin: 5px; }
        .magic-powder { background: #e8dbff; color: #6c5ce7; }
        .golden-key { background: #fff3cd; color: #856404; }
        .growth-potential { background: #f1f2f6; color: #636e72; }

        /* [수정] 딜레마 전용 컨테이너 */
        .whisper-btns {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const EMAP_QUESTIONS = [
            // Chapter 1: 광장 (O vs I)
            { id: 1, ch: 1, name: "광장", text: "축제의 왁자지껄한 소리가 들리면 나도 모르게 발걸음이 빨라진다.", cat: 'O' },
            { id: 2, ch: 1, name: "광장", text: "사람들이 많은 곳보다는 조용한 벤치에서 축제를 구경하는 게 더 편하다.", cat: 'I' },
            { id: 3, ch: 1, name: "광장", text: "처음 본 사람에게 먼저 인사를 건네는 것이 어렵지 않다.", cat: 'O' },
            { id: 4, ch: 1, name: "광장", text: "혼자만의 시간을 가질 때 비로소 에너지가 충전되는 기분이다.", cat: 'I' },
            { id: 5, ch: 1, name: "광장", text: "모임이나 파티 초대를 받으면 거절하기보다 일단 가고 싶어진다.", cat: 'O' },
            { id: 6, ch: 1, name: "광장", text: "생각이 많아질 때는 누군가와 대화하기보다 혼자 정리하는 편이다.", cat: 'I' },
            { id: 7, ch: 1, name: "광장", text: "왁자지껄한 시장 구경이 조용한 독서보다 더 활력이 돋는다.", cat: 'O' },
            { id: 8, ch: 1, name: "광장", text: "모르는 사람과 섞여 있는 상황이 즐겁고 흥미롭다.", cat: 'O' },
            { id: 9, ch: 1, name: "광장", text: "대화의 흐름이 끊기지 않게 주로 내가 말을 주도하는 편이다.", cat: 'O' },
            { id: 10, ch: 1, name: "광장", text: "자신의 속마음을 타인에게 드러내는 데 시간이 오래 걸린다.", cat: 'I' },
            { id: 11, ch: 1, name: "광장", text: "여러 사람과 동시에 어울리는 것이 피곤하기보다 즐겁다.", cat: 'O' },
            { id: 12, ch: 1, name: "광장", text: "주변 사람들의 관심이 나에게 쏟아질 때 행복함을 느낀다.", cat: 'O' },
            { id: 13, ch: 1, name: "광장", text: "깊이 있는 대화를 나눌 소수의 친구만 있으면 충분하다고 생각한다.", cat: 'I' },
            { id: 14, ch: 1, name: "광장", text: "낯선 환경에 던져져도 금방 적응하여 사람들과 친해진다.", cat: 'O' },
            { id: 15, ch: 1, name: "광장", text: "활동적인 취미 활동을 할 때 삶의 보람을 느낀다.", cat: 'O' },
            { id: 16, ch: 1, name: "광장", text: "생각을 말로 표현하기보다 글로 정리하는 게 더 명확하다.", cat: 'I' },

            // Chapter 2: 언덕 (D vs V)
            { id: 17, ch: 2, name: "언덕", text: "발밑에 핀 작은 풀꽃의 잎맥 하나하나를 관찰하는 것을 즐긴다.", cat: 'D' },
            { id: 18, ch: 2, name: "언덕", text: "언덕 너머 구름의 모양을 보며 저 너머의 전설을 상상하곤 한다.", cat: 'V' },
            { id: 19, ch: 2, name: "언덕", text: "눈앞의 사실보다는 그 이면에 숨겨진 의미나 비유가 더 궁금하다.", cat: 'V' },
            { id: 20, ch: 2, name: "언덕", text: "구체적인 수치나 검증된 사실이 주어질 때 비로소 신뢰감을 느낀다.", cat: 'D' },
            { id: 21, ch: 2, name: "언덕", text: "나무 한 그루보다는 숲 전체의 분위기와 흐름에 먼저 집중한다.", cat: 'V' },
            { id: 22, ch: 2, name: "언덕", text: "경험해본 적 없는 일보다 익숙하고 증명된 방식을 선호한다.", cat: 'D' },
            { id: 23, ch: 2, name: "언덕", text: "상상력이 풍부하여 가끔 멍하니 공상에 잠길 때가 많다.", cat: 'V' },
            { id: 24, ch: 2, name: "언덕", text: "어떤 물건을 살 때 성능과 사양을 꼼꼼하게 비교 분석한다.", cat: 'D' },
            { id: 25, ch: 2, name: "언덕", text: "복잡한 원리보다는 실질적인 사용법에 더 관심이 많다.", cat: 'D' },
            { id: 26, ch: 2, name: "언덕", text: "설명서 없이도 물건의 원리를 직관적으로 파악하는 편이다.", cat: 'V' },
            { id: 27, ch: 2, name: "언덕", text: "현실적인 문제 해결보다는 미래에 대한 아이디어를 내는 게 더 재미있다.", cat: 'V' },
            { id: 28, ch: 2, name: "언덕", text: "비유나 상징적인 표현보다는 직설적인 표현이 더 이해하기 쉽다.", cat: 'D' },
            { id: 29, ch: 2, name: "언덕", text: "사건의 결과보다 그 속에 담긴 철학적 가치가 더 궁금하다.", cat: 'V' },
            { id: 30, ch: 2, name: "언덕", text: "반복되는 일상 속에서도 소소한 확실함을 찾는 게 좋다.", cat: 'D' },
            { id: 31, ch: 2, name: "언덕", text: "미래의 가능성을 보고 도전하는 일에 큰 가치를 느낀다.", cat: 'V' },
            { id: 32, ch: 2, name: "언덕", text: "구체적인 장소나 인물의 특징을 아주 세밀하게 기억한다.", cat: 'D' },

            // Chapter 3: 찻집 (H vs R)
            { id: 33, ch: 3, name: "찻집", text: "친구가 힘들어할 때, 논리적인 해결책보다는 따뜻한 위로가 먼저 나간다.", cat: 'H' },
            { id: 34, ch: 3, name: "찻집", text: "어떤 결정을 내릴 때 내 감정보다는 객관적인 원칙을 중시한다.", cat: 'R' },
            { id: 35, ch: 3, name: "찻집", text: "주변 사람들의 기분이 어떤지 금방 눈치채고 공감하는 편이다.", cat: 'H' },
            { id: 36, ch: 3, name: "찻집", text: "잘못된 점이 있다면 상대방의 기분보다 사실을 정확히 짚어주는 게 낫다.", cat: 'R' },
            { id: 37, ch: 3, name: "찻집", text: "사람들 사이의 조화와 화합을 깨뜨리는 상황이 매우 불편하다.", cat: 'H' },
            { id: 38, ch: 3, name: "찻집", text: "이성적으로 판단했을 때 옳다면, 다소 차갑게 보일지라도 밀어붙인다.", cat: 'R' },
            { id: 39, ch: 3, name: "찻집", text: "정의로운 사회보다 모두가 행복하고 따뜻한 사회를 더 꿈꾼다.", cat: 'H' },
            { id: 40, ch: 3, name: "찻집", text: "감정에 치우치지 않고 공정하게 평가받는 것을 중요하게 생각한다.", cat: 'R' },
            { id: 41, ch: 3, name: "찻집", text: "누군가 나를 필요로 할 때 기꺼이 내 시간을 내어주는 것이 기쁘다.", cat: 'H' },
            { id: 42, ch: 3, name: "찻집", text: "비판적인 피드백을 들었을 때 그 논리적 타당성을 먼저 검토한다.", cat: 'R' },
            { id: 43, ch: 3, name: "찻집", text: "칭찬을 들을 때 '고마워'라는 말보다 '어떤 점이 좋았어?'라고 묻게 된다.", cat: 'R' },
            { id: 44, ch: 3, name: "찻집", text: "영화나 드라마를 볼 때 등장인물의 감정에 쉽게 동화되어 눈물을 흘린다.", cat: 'H' },
            { id: 45, ch: 3, name: "찻집", text: "나와 의견이 달라도 상대방의 입장에서 생각하면 이해가 된다.", cat: 'H' },
            { id: 46, ch: 3, name: "찻집", text: "법과 규칙은 예외 없이 모두에게 엄격하게 적용되어야 한다.", cat: 'R' },
            { id: 47, ch: 3, name: "찻집", text: "따뜻한 배려가 부족한 지적인 대화는 공허하게 느껴진다.", cat: 'H' },
            { id: 48, ch: 3, name: "찻집", text: "일의 성공 여부는 결과의 완벽함으로 증명되어야 한다.", cat: 'R' },

            // Chapter 4: 기차역 (S vs F)
            { id: 49, ch: 4, name: "기차역", text: "여행을 떠나기 전, 시간별로 상세한 일정을 짜야 마음이 놓인다.", cat: 'S' },
            { id: 50, ch: 4, name: "기차역", text: "정해진 계획보다는 그때그때 발길 닿는 대로 움직이는 여행이 즐겁다.", cat: 'F' },
            { id: 51, ch: 4, name: "기차역", text: "내 방이나 책상은 항상 정해진 규칙대로 정리되어 있어야 한다.", cat: 'S' },
            { id: 52, ch: 4, name: "기차역", text: "마감 기한이 닥쳐올 때 오히려 집중력이 더 발휘되는 것 같다.", cat: 'F' },
            { id: 53, ch: 4, name: "기차역", text: "결정하기 전에 모든 정보를 수집하고 신중하게 검토하는 편이다.", cat: 'S' },
            { id: 54, ch: 4, name: "기차역", text: "미리 약속을 잡기보다 즉흥적으로 만나 노는 것을 더 좋아한다.", cat: 'F' },
            { id: 55, ch: 4, name: "기차역", text: "일을 끝내지 못한 상태로 잠드는 것이 매우 찜찜하다.", cat: 'S' },
            { id: 56, ch: 4, name: "기차역", text: "계획에 없던 일이 생겨도 당황하지 않고 즐겁게 받아들인다.", cat: 'F' },
            { id: 57, ch: 4, name: "기차역", text: "플래너나 다이어리를 쓰며 하루 일과를 점검하는 것이 습관이다.", cat: 'S' },
            { id: 58, ch: 4, name: "기차역", text: "하나의 일을 완전히 끝내기 전에 다른 재미있는 일에 관심을 갖게 된다.", cat: 'F' },
            { id: 59, ch: 4, name: "기차역", text: "결과만큼이나 그 결과에 도달하는 체계적인 과정이 중요하다.", cat: 'S' },
            { id: 60, ch: 4, name: "기차역", text: "호기심이 생기면 일단 해보고 나중에 생각하는 편이다.", cat: 'F' },
            { id: 61, ch: 4, name: "기차역", text: "정해진 매뉴얼이 있는 환경에서 업무 효율이 높아진다.", cat: 'S' },
            { id: 62, ch: 4, name: "기차역", text: "자유롭고 창의적인 분위기에서 능력을 더 잘 발휘한다.", cat: 'F' },
            { id: 63, ch: 4, name: "기차역", text: "외출 준비를 할 때 필요한 물건들을 리스트업하여 챙긴다.", cat: 'S' },
            { id: 64, ch: 4, name: "기차역", text: "심각한 고민보다는 가벼운 농담으로 분위기를 환기시키는 걸 좋아한다.", cat: 'F' },
        ];

        const BEAR_DATA = {
            "ODHS": { title: "마을 축제 위원장", desc: "책임감 있는 리더로서, 마을의 모든 활기를 책임지는 든든한 존재입니다.", traits: ["강한 추진력", "현실적 감각", "사교적 리더십", "체계적 관리"] },
            "ODHR": { title: "다정한 보안관", desc: "정의롭고 따뜻한 수호자로, 마을의 평화와 안정을 세심하게 살핍니다.", traits: ["봉사 정신", "규칙 준수", "온화한 카리스마", "성실함"] },
            "ODRS": { title: "성실한 건축가", desc: "정확하고 신뢰받는 전문가로서, 마을의 단단한 기반을 설계합니다.", traits: ["분석적 사고", "꼼꼼한 완벽주의", "실질적 해결사", "정직함"] },
            "ODRF": { title: "에너지 넘치는 탐험가", desc: "적응력 빠른 활동가로서, 마을 곳곳의 새로운 발견을 주도합니다.", traits: ["즉흥적 에너지", "다재다능", "긍정적 행동력", "친화력"] },
            "OVHS": { title: "희망의 등대지기", desc: "꿈을 전파하는 긍정 리더로서, 마을 사람들에게 미래의 빛을 선사합니다.", traits: ["이상주의적 비전", "언변의 마술사", "따뜻한 공감", "열정적 리더십"] },
            "OVHF": { title: "무지개빛 예술가", desc: "세상을 색칠하는 창의적 영혼으로서, 마을에 예술적 영감을 불어넣습니다.", traits: ["독창적 표현", "풍부한 감수성", "자유로운 상상", "열린 마음"] },
            "OVRS": { title: "스마트한 전략가", desc: "큰 그림을 그리는 지성인으로서, 마을의 먼 미래를 지혜롭게 계획합니다.", traits: ["통찰력", "전략적 기획", "논리적 판단", "지적 호기심"] },
            "OVRF": { title: "반짝이는 발명가", desc: "끊임없이 도전하는 호기심 대장으로서, 마을을 더 즐겁게 만들 아이디어를 냅니다.", traits: ["발상의 전환", "유연한 사고", "다양한 시도", "빠른 실행력"] },
            "IDHS": { title: "포근한 수호자", desc: "묵묵히 자리를 지키는 세심한 친구로서, 가장 가까운 곳에서 평화를 지킵니다.", traits: ["신중함", "한결같은 마음", "세심한 배려", "책임감"] },
            "IDHF": { title: "마을 마음 정원사", desc: "누구나 편히 쉬어가는 쉼터가 되어주는, 따스한 마음의 소유자입니다.", traits: ["부드러운 공감", "예술적 감각", "겸손함", "평화주의자"] },
            "IDRS": { title: "현명한 기록가", desc: "역사와 지식을 정리하는 지혜로운 이로서, 마을의 소중한 기록을 보존합니다.", traits: ["정확성", "깊은 집중력", "객관적 관찰", "성실한 탐구"] },
            "IDRF": { title: "묵묵한 장인", desc: "말보다 행동으로 보여주는 실천가로서, 마을의 실제적인 도구와 물건을 다룹니다.", traits: ["냉철한 분석", "실용적 기술", "민첩한 해결", "관찰력"] },
            "IVHS": { title: "꿈꾸는 예언자", desc: "마음의 눈으로 진심을 읽는 치유자로서, 사람들의 내면을 따뜻하게 어루만집니다.", traits: ["깊은 통찰", "강한 신념", "이타심", "예술적 영감"] },
            "IVHF": { title: "낭만적인 시인", desc: "상상의 구름을 타는 자유로운 여행자로서, 아름다운 글과 마음을 공유합니다.", traits: ["풍부한 상상력", "가치 중심적", "유연함", "부드러운 위로"] },
            "IVRS": { title: "깊은 밤의 철학자", desc: "본질을 탐구하는 신중한 사고가로서, 마을의 진리를 묵묵히 탐구합니다.", traits: ["독창적 논리", "지적 독립성", "객관성", "심층적 탐구"] },
            "IVRF": { title: "별을 찾는 탐구자", desc: "혼자만의 세계를 즐기는 신비로운 존재로서, 밤하늘의 무수한 가능성을 읽습니다.", traits: ["추상적 사고", "직관적 통찰", "조용한 카리스마", "상상력"] }
        };

        function App() {
            const [page, setPage] = useState('home');
            const [chapter, setChapter] = useState(1);
            const [qIdx, setQIdx] = useState(0);
            const [scores, setScores] = useState({ O: 0, I: 0, D: 0, V: 0, H: 0, R: 0, S: 0, F: 0 });
            const [neutralCount, setNeutralCount] = useState(0);
            const [isTrans, setIsTrans] = useState(false);
            const [selIdx, setSelIdx] = useState(null);
            const [finalCode, setFinalCode] = useState("");

            const currentQs = useMemo(() => EMAP_QUESTIONS.filter(q => q.ch === chapter), [chapter]);

            const env = useMemo(() => {
                const getPct = (a, b) => {
                    const diff = a - b;
                    return Math.min(Math.max(((diff + 24) / 48) * 100, 0), 100);
                };
                return {
                    oi: getPct(scores.O, scores.I),
                    dv: getPct(scores.D, scores.V),
                    hr: getPct(scores.H, scores.R),
                    sf: getPct(scores.S, scores.F)
                };
            }, [scores]);

            useEffect(() => {
                document.documentElement.style.setProperty('--oi-index', `${env.oi}%`);
                document.documentElement.style.setProperty('--dv-index', `${env.dv}%`);
                document.documentElement.style.setProperty('--hr-index', `${env.hr}%`);
                document.documentElement.style.setProperty('--sf-index', `${env.sf}%`);
            }, [env]);

            const onAnswer = (val, btnIdx) => {
                setSelIdx(btnIdx);
                const cat = currentQs[qIdx].cat;
                if (val === 0) setNeutralCount(prev => prev + 1);
                
                setTimeout(() => {
                    setScores(prev => ({ ...prev, [cat]: prev[cat] + val }));
                    setSelIdx(null);
                    
                    if (qIdx + 1 < currentQs.length) {
                        setQIdx(prev => prev + 1);
                    } else {
                        checkChapterEnd();
                    }
                }, 400);
            };

            const checkChapterEnd = () => {
                const pair = [['O','I'], ['D','V'], ['H','R'], ['S','F']][chapter-1];
                if (scores[pair[0]] === scores[pair[1]]) {
                    setPage('whisper');
                } else {
                    goNext();
                }
            };

            const goNext = () => {
                setIsTrans(true);
                setTimeout(() => {
                    if (chapter < 4) {
                        setChapter(prev => prev + 1);
                        setQIdx(0);
                        setPage('chapter');
                    } else {
                        finish();
                    }
                    setIsTrans(false);
                }, 1200);
            };

            const onWhisperAnswer = (choice) => {
                const pair = [['O','I'], ['D','V'], ['H','R'], ['S','F']][chapter-1];
                const target = choice === 'A' ? pair[0] : pair[1];
                setScores(prev => ({ ...prev, [target]: prev[target] + 0.1 }));
                goNext();
            };

            const finish = () => {
                let code = "";
                code += scores.O >= scores.I ? "O" : "I";
                code += scores.D >= scores.V ? "D" : "V";
                code += scores.H >= scores.R ? "H" : "R";
                code += scores.S >= scores.F ? "S" : "F";
                setFinalCode(code);
                setPage('result');
            };

            return (
                <div className="emap-app">
                    <div className="fog-layer"></div>
                    {isTrans && <div className="transition-screen">
                        <h2 style={{color: 'var(--primary)', marginBottom: '15px'}}>마을의 다음 장소로 향하는 중...</h2>
                        <p style={{color: '#999'}}>당신의 발걸음이 새로운 지도를 그리고 있어요.</p>
                    </div>}

                    <div className="main-content">
                        {page === 'home' && (
                            <div className="card fade-in">
                                <div style={{fontSize: '4.5rem', marginBottom: '1.5rem'}}>🏡</div>
                                <h1 className="main-title">EMAP</h1>
                                <p className="philosophy">"진정한 치료는 나를 바꾸는 것이 아니라,<br/>어떤 모습의 나라도 사랑해주는 것."</p>
                                <div style={{lineHeight: 1.9, color: '#444', marginBottom: '2.5rem'}}>
                                    당신의 선택에 따라 수채화 물감이 번지듯<br/>
                                    마을의 안개와 공기가 유기적으로 변합니다.<br/>
                                    64개의 질문을 통해 당신만의 아기 곰을 만나보세요.
                                </div>
                                <button className="btn-action" onClick={() => setPage('chapter')}>마을 입장하기</button>
                            </div>
                        )}

                        {page === 'chapter' && !isTrans && (
                            <div className="card fade-in">
                                <div style={{marginBottom: '25px'}}>
                                    <span style={{background: 'var(--primary)', color: 'white', padding: '6px 18px', borderRadius: '30px', fontSize: '0.85rem', fontWeight: 800}}>
                                        Chapter {chapter}: {currentQs[0].name}
                                    </span>
                                    <p style={{marginTop: '12px', fontSize: '0.95rem', color: '#aaa'}}>{qIdx + 1} / {currentQs.length}</p>
                                </div>
                                
                                <h2 style={{fontSize: '1.7rem', lineHeight: 1.6, minHeight: '90px', display: 'flex', alignItems: 'center', justifyContent: 'center'}}>
                                    {currentQs[qIdx].text}
                                </h2>

                                <div className="scale-container">
                                    {[2, 1, 0, -1, -2].map((val, idx) => (
                                        <button 
                                            key={idx}
                                            className={`btn-scale ${['v-agree','agree','neutral','disagree','v-disagree'][idx]} ${selIdx === idx ? 'selected' : ''}`}
                                            onClick={() => onAnswer(val, idx)}
                                        >
                                            <span>{['매우 그렇다','그렇다','모르겠다','아니다','매우 아니다'][idx]}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {page === 'whisper' && (
                            <div className="card fade-in whisper-card">
                                <div style={{fontSize: '3.5rem', marginBottom: '10px'}}>🐱</div>
                                <h3>다정 고양이의 속삭임</h3>
                                <p style={{lineHeight: 1.9, margin: '25px 0', fontSize: '1.1rem'}}>
                                    "두 가지 마음이 똑같은 무게로 반짝이고 있네...<br/>
                                    그래도 지금 이 순간, 당신의 마음이 조금 더 설레는 쪽은 어디야?"
                                </p>
                                <div className="whisper-btns">
                                    <button className="btn-action secondary" onClick={() => onWhisperAnswer('A')}>
                                        {chapter === 1 && "활기찬 마을 광장"}
                                        {chapter === 2 && "세심한 풀꽃 관찰"}
                                        {chapter === 3 && "따뜻한 차와 위로"}
                                        {chapter === 4 && "정돈된 계획의 안심"}
                                    </button>
                                    <button className="btn-action secondary" onClick={() => onWhisperAnswer('B')}>
                                        {chapter === 1 && "평온한 숲속 벤치"}
                                        {chapter === 2 && "드넓은 구름의 전설"}
                                        {chapter === 3 && "현명한 지혜의 조언"}
                                        {chapter === 4 && "발길 닿는 자유로운 여행"}
                                    </button>
                                </div>
                            </div>
                        )}

                        {page === 'result' && (
                            <div className="card fade-in" style={{textAlign: 'center'}}>
                                <div className="result-badge">당신은 마을의 소중한...</div>
                                <h1 className="bear-name">{BEAR_DATA[finalCode]?.title}</h1>
                                <p className="bear-code">({finalCode} 유형 아기 곰)</p>

                                <div className="quote-box">
                                    "{BEAR_DATA[finalCode]?.desc}"
                                </div>

                                <div className="trait-tags">
                                    {BEAR_DATA[finalCode]?.traits.map(t => <span key={t} className="tag">{t}</span>)}
                                </div>

                                <div style={{margin: '20px 0'}}>
                                    {(finalCode.includes('V') && finalCode.includes('F')) && <span className="synergy-badge magic-powder">✨ 마법 가루 (상상+자유)</span>}
                                    {(finalCode.includes('D') && finalCode.includes('S')) && <span className="synergy-badge golden-key">🔑 황금 열쇠 (세심+계획)</span>}
                                    {neutralCount > 15 && <span className="synergy-badge growth-potential">🌫️ 무궁무진한 성장 가능성</span>}
                                </div>

                                <div style={{textAlign: 'left', marginTop: '45px'}}>
                                    <h4 style={{marginBottom: '15px', color: 'var(--primary)', textAlign: 'center'}}>✨ 다정 고양이가 보내는 축복의 편지</h4>
                                    <div className="letter-paper">
                                        안녕, {BEAR_DATA[finalCode]?.title}님! <br/><br/>
                                        오늘 당신이 마을의 네 장소를 여행하는 동안, 마을의 공기는 당신의 대답에 따라 수채화 물감이 번지듯 시시각각 아름다운 무늬를 그려냈어요.<br/><br/>
                                        {env.oi > 60 ? '활기찬 에너지' : '차분한 평온함'}를 머금은 당신의 발걸음과, {env.dv > 60 ? '세상을 맑고 또렷하게 관찰하는 눈길' : '넓은 구름 너머를 상상하는 마음'}은 우리 마을의 가장 소중한 보물이에요.<br/><br/>
                                        {env.hr > 60 ? '따뜻한 공감의 온기' : '명확한 진리의 지혜'}를 전해준 당신에게 고마움을 전해요. 어떤 모습이라도 당신은 그 자체로 완벽한 '고유의 무늬'를 가지고 있답니다. 잊지 말고 당신을 꼭 안아주세요!<br/><br/>
                                        다정 고양이가 당신의 내일을 축복할게요. 언제든 다시 쉬러 오세요!
                                    </div>
                                </div>

                                <button className="btn-action" style={{marginTop: '40px'}} onClick={() => window.location.reload()}>마을 다시 방문하기</button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
